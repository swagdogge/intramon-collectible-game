<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intramon</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

/* =============================================
   MEGA DRIVE / 16-BIT TCG — DESIGN SYSTEM
   ============================================= */
:root {
  /* Palette — warm parchment + saturated JRPG accents */
  --bg:           #1a1a2e;
  --bg2:          #16213e;
  --panel:        #f5e6c8;
  --panel-dark:   #e8d5a8;
  --panel-darker: #c9b882;
  --panel-shadow: #8a7240;

  --ink:          #2c1810;
  --ink-soft:     #5c3d2e;
  --ink-muted:    #8b6f47;

  --red:    #e63946;
  --blue:   #457b9d;
  --yellow: #f4a261;
  --green:  #2d6a4f;
  --purple: #7b2d8b;
  --teal:   #1d8a8a;

  /* Rarity colors */
  --common:    #4a9e4a;
  --rare:      #2979c9;
  --epic:      #9c27b0;
  --legendary: #e6920a;

  /* Element type colors (Pokémon-card inspired) */
  --el-electro: #f9c80e;
  --el-water:   #4dabf7;
  --el-fire:    #ff6b35;
  --el-ice:     #a8dadc;
  --el-plant:   #52b788;
  --el-ground:  #bc6c25;

  --font-display: 'Fredoka One', cursive;
  --font-body:    'Nunito', sans-serif;

  /* Beveled border */
  --bevel-light: rgba(255,255,255,0.7);
  --bevel-dark:  rgba(0,0,0,0.35);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background:
    radial-gradient(ellipse at 20% 0%, #2d1b69 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, #1a3a5c 0%, transparent 50%),
    var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 16px;
  -webkit-font-smoothing: antialiased;
}

/* Tile-repeat BG pattern (16-bit floor) */
body::before {
  content: '';
  pointer-events: none;
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* =============================================
   PANEL / WINDOW COMPONENT (RPG menu style)
   ============================================= */
.rpg-panel {
  background: var(--panel);
  border-radius: 10px;
  position: relative;
  /* Layered bevel effect */
  box-shadow:
    0 0 0 3px var(--panel-darker),
    0 0 0 5px var(--panel-shadow),
    4px 6px 0 5px rgba(0,0,0,0.4),
    inset 0 1px 0 var(--bevel-light),
    inset 0 -1px 0 var(--bevel-dark);
}

.rpg-panel-title {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.05em;
  color: var(--panel);
  background: var(--ink);
  padding: 5px 14px 4px;
  border-radius: 7px 7px 0 0;
  display: flex; align-items: center; gap: 8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}

/* =============================================
   TOP BAR
   ============================================= */
#top-bar {
  max-width: 1160px;
  margin: 0 auto 20px;
  padding: 10px 16px;
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
  position: relative; z-index: 10;
  border-radius: 10px;
  background: var(--ink);
  box-shadow:
    0 0 0 3px #3d2810,
    3px 5px 0 3px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.08);
}
#top-bar.hidden { display: none; }

#game-title {
  font-family: var(--font-display);
  font-size: 26px;
  color: var(--yellow);
  letter-spacing: 0.04em;
  text-shadow:
    2px 2px 0 #7a4800,
    -1px -1px 0 rgba(255,255,255,0.1);
  line-height: 1;
}
#username-display {
  font-size: 13px;
  font-weight: 700;
  color: var(--panel-dark);
  margin-top: 2px;
}

#crystal-counter {
  background: #2c1810;
  border: 2px solid var(--yellow);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--yellow);
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 2px 0 #7a4800, inset 0 1px 0 rgba(255,200,0,0.15);
}

/* =============================================
   BUTTONS
   ============================================= */
button {
  appearance: none; border: none; cursor: pointer;
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.03em;
  border-radius: 6px;
  padding: 8px 16px;
  transition: transform .08s, box-shadow .08s, filter .08s;
  position: relative;
  line-height: 1;
}

.btn-primary {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 0 #8a1020, inset 0 1px 0 rgba(255,255,255,0.25);
  border: 1px solid #c02030;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.btn-primary:hover  { filter: brightness(1.1); }
.btn-primary:active { transform: translateY(3px); box-shadow: 0 1px 0 #8a1020; }

.btn-secondary {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 4px 0 #1a4060, inset 0 1px 0 rgba(255,255,255,0.2);
  border: 1px solid #1a5070;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.btn-secondary:hover  { filter: brightness(1.1); }
.btn-secondary:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a4060; }

/* =============================================
   INPUTS
   ============================================= */
input, select {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  padding: 7px 12px;
  border-radius: 6px;
  background: #fff8ee;
  border: 2px solid var(--panel-darker);
  color: var(--ink);
  outline: none;
  box-shadow: inset 0 2px 3px rgba(0,0,0,0.12);
}
input:focus, select:focus { border-color: var(--blue); }
input::placeholder { color: var(--ink-muted); font-weight: 600; }
select option { background: #fff8ee; color: var(--ink); }

/* =============================================
   LAYOUT
   ============================================= */
#main-container {
  display: flex; gap: 18px;
  max-width: 1160px; margin: 0 auto;
  align-items: flex-start;
  position: relative; z-index: 4;
}

/* =============================================
   LEADERBOARD
   ============================================= */
#leaderboard {
  width: 220px; flex-shrink: 0;
}
#leaderboard-inner {
  padding: 12px 14px;
}
#leaderboard-list {
  list-style: none;
  padding: 0; margin: 0 0 12px;
}
#leaderboard-list li {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  padding: 6px 8px;
  border-bottom: 2px solid var(--panel-darker);
  display: flex; align-items: center; gap: 6px;
}
#leaderboard-list li:last-child { border-bottom: none; }
#leaderboard-list li .rank { 
  font-family: var(--font-display);
  font-size: 13px;
  min-width: 24px;
  color: var(--ink-muted);
}
#leaderboard-list li:first-child .rank { color: var(--legendary); }
#leaderboard-list li:nth-child(2) .rank { color: var(--ink-soft); }
#leaderboard-list li:nth-child(3) .rank { color: #b87333; }

/* =============================================
   MONSTER GRID
   ============================================= */
#monster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 16px;
  flex: 1;
}

/* ── THE CARD — proper TCG layout ── */
.monster-card {
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  overflow: hidden;
  transition: transform .15s cubic-bezier(.2,.8,.2,1.2), box-shadow .15s;
  background: var(--panel);
  /* Outer frame */
  box-shadow:
    0 0 0 2px var(--card-border, #555),
    0 0 0 4px var(--card-outer, #333),
    3px 5px 0 4px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.5);
  display: flex; flex-direction: column;
}
.monster-card:hover {
  transform: translateY(-6px) scale(1.03) rotate(-0.5deg);
  box-shadow:
    0 0 0 2px var(--card-border, #555),
    0 0 0 4px var(--card-outer, #333),
    6px 12px 0 4px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.5);
  z-index: 10;
}

/* Rarity border variables */
.monster-card[data-rarity="common"]    { --card-border: #5aab5a; --card-outer: #2d6a2d; --type-bg: #2d6a4f; }
.monster-card[data-rarity="rare"]      { --card-border: #4a90d9; --card-outer: #1a5080; --type-bg: #1a5080; }
.monster-card[data-rarity="epic"]      { --card-border: #c060d0; --card-outer: #6a1080; --type-bg: #6a1080; }
.monster-card[data-rarity="legendary"] { --card-border: #f0a020; --card-outer: #905000; --type-bg: #905000; }

/* Card top banner — type/name strip like Pokémon card */
.card-banner {
  background: var(--type-bg, #444);
  padding: 5px 8px 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.card-banner-name {
  font-family: var(--font-display);
  font-size: 11.5px;
  color: #fff;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100px;
}
.card-hp-badge {
  font-family: var(--font-display);
  font-size: 10px;
  color: #fff;
  background: rgba(0,0,0,0.3);
  border-radius: 4px;
  padding: 1px 5px;
  white-space: nowrap;
}

/* Image area */
.card-art {
  position: relative;
  background: var(--art-bg, #e0d8c8);
  padding: 8px;
  display: flex; align-items: center; justify-content: center;
  min-height: 108px;
  overflow: hidden;
}
/* Type-colored art backgrounds */
.monster-card[data-element="Electro"] .card-art { background: linear-gradient(160deg, #fff8c0, #f0e060); }
.monster-card[data-element="Water"]   .card-art { background: linear-gradient(160deg, #c8eeff, #a0d0f0); }
.monster-card[data-element="Fire"]    .card-art { background: linear-gradient(160deg, #ffe0c0, #ffb080); }
.monster-card[data-element="Ice"]     .card-art { background: linear-gradient(160deg, #d8f4f8, #b0e0e8); }
.monster-card[data-element="Plant"]   .card-art { background: linear-gradient(160deg, #d0f0d0, #98d898); }
.monster-card[data-element="Ground"]  .card-art { background: linear-gradient(160deg, #f0e0c0, #d0a868); }

/* Art inner frame — like a card illustration box */
.card-art::before {
  content: '';
  position: absolute; inset: 4px;
  border: 1.5px solid rgba(0,0,0,0.12);
  border-radius: 4px;
  pointer-events: none;
}

.card-art img {
  width: 82px; height: 82px;
  object-fit: contain;
  image-rendering: auto;
  position: relative; z-index: 1;
  transition: transform .2s cubic-bezier(.2,.8,.2,1.2), filter .2s;
  filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.25));
}
.monster-card:hover .card-art img {
  transform: scale(1.08) translateY(-3px);
  filter: drop-shadow(3px 6px 6px rgba(0,0,0,0.35));
}

/* Rarity sparkle for legendary */
.monster-card[data-rarity="legendary"] .card-art::after {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(
    120deg,
    transparent 25%, rgba(255,220,80,0.25) 45%,
    rgba(255,255,200,0.35) 50%, rgba(255,220,80,0.25) 55%,
    transparent 75%
  );
  background-size: 300% 100%;
  animation: cardShimmer 2.5s linear infinite;
}
@keyframes cardShimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -100% 0; }
}

/* Card bottom info strip */
.card-info {
  padding: 5px 8px 7px;
  background: var(--panel-dark);
  border-top: 2px solid var(--card-border, #aaa);
  display: flex; align-items: center; justify-content: space-between;
}
.card-rarity-pip {
  font-size: 11px;
  font-weight: 800;
  color: var(--card-border, #999);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.card-type-pill {
  font-size: 10px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 20px;
  color: #fff;
  background: var(--type-bg, #666);
  text-shadow: 0 1px 1px rgba(0,0,0,0.4);
}

/* Entrance animation */
@keyframes cardDeal {
  from { opacity: 0; transform: translateY(20px) scale(.92) rotate(2deg); }
  to   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}
.monster-card[data-loaded="true"] {
  animation: cardDeal .35s cubic-bezier(.2,.8,.2,1) both;
}

/* =============================================
   MODALS — RPG dialog box style
   ============================================= */
.modal {
  display: none; position: fixed; inset: 0;
  background: rgba(10,8,20,0.78);
  justify-content: center; align-items: center;
  padding: 20px; z-index: 1000;
}
.modal.show { display: flex; }

.modal-content {
  width: min(420px, 96%);
  border-radius: 12px;
  overflow: hidden;
  background: var(--panel);
  box-shadow:
    0 0 0 3px var(--panel-darker),
    0 0 0 6px var(--panel-shadow),
    6px 10px 0 6px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.6);
  animation: modalPop .2s cubic-bezier(.2,.8,.2,1.3);
}
@keyframes modalPop {
  from { opacity:0; transform: scale(.88) translateY(12px); }
  to   { opacity:1; transform: scale(1)   translateY(0); }
}

.modal-header {
  background: var(--ink);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header-title {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--yellow);
  text-shadow: 1px 1px 0 #7a4800;
}
.close-btn {
  background: #c0392b;
  color: #fff;
  border: none;
  font-family: var(--font-display);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 4px;
  box-shadow: 0 3px 0 #7a1008, inset 0 1px 0 rgba(255,255,255,0.2);
  cursor: pointer;
}
.close-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7a1008; }

.modal-body {
  padding: 18px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  text-align: center;
}

/* Modal card-style illustration */
.modal-art-box {
  width: 150px; height: 150px;
  border-radius: 8px;
  border: 3px solid var(--panel-darker);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 3px 0 var(--panel-shadow);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.modal-art-box img {
  width: 120px; height: 120px;
  object-fit: contain;
  filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
}

#modal-name, #inbox-name {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--ink);
  margin-top: 4px;
}
#modal-rarity, #inbox-rarity {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.06em;
}

/* Stat bars — like a Pokémon card's HP/attack display */
.stat-list {
  width: 100%;
  background: var(--panel-dark);
  border-radius: 6px;
  border: 2px solid var(--panel-darker);
  overflow: hidden;
  margin-top: 4px;
}
.stat-row {
  display: flex; align-items: center;
  padding: 6px 12px; gap: 10px;
  border-bottom: 1px solid var(--panel-darker);
}
.stat-row:last-child { border-bottom: none; }
.stat-label {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--ink-muted);
  width: 36px; text-align: left;
}
.stat-bar-wrap {
  flex: 1; height: 10px;
  background: var(--panel-darker);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--panel-shadow);
}
.stat-bar {
  height: 100%;
  border-radius: 5px;
  transition: width .4s ease;
}
.stat-bar.hp    { background: linear-gradient(90deg, #e63946, #ff7c85); }
.stat-bar.atk   { background: linear-gradient(90deg, #f4a261, #ffd166); }
.stat-bar.def   { background: linear-gradient(90deg, #457b9d, #74b8d8); }
.stat-val {
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--ink);
  min-width: 28px;
  text-align: right;
}

.modal-footer {
  padding: 12px 18px;
  background: var(--panel-dark);
  border-top: 2px solid var(--panel-darker);
  display: flex; gap: 10px; justify-content: center;
}

#inbox-count {
  font-size: 13px; font-weight: 700;
  color: var(--ink-muted);
  background: var(--panel-dark);
  border-radius: 20px;
  padding: 3px 12px;
  border: 1px solid var(--panel-darker);
}
#inbox-reason {
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--blue);
  letter-spacing: 0.04em;
}

/* =============================================
   LOGIN SCREEN — cartridge title screen
   ============================================= */
#login-screen {
  position: fixed; inset: 0; z-index: 5000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px;
  background:
    radial-gradient(ellipse at 50% 40%, #2d1b69 0%, transparent 60%),
    #0e0c1a;
}
#login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 16px 16px;
}

.title-card {
  background: var(--panel);
  border-radius: 16px;
  padding: 36px 48px;
  text-align: center;
  position: relative;
  box-shadow:
    0 0 0 4px var(--panel-darker),
    0 0 0 8px #3d2810,
    8px 14px 0 8px rgba(0,0,0,0.6),
    inset 0 2px 0 rgba(255,255,255,0.6);
}
.title-card h1 {
  font-family: var(--font-display);
  font-size: clamp(42px, 8vw, 72px);
  color: var(--yellow);
  letter-spacing: 0.06em;
  text-shadow:
    3px 3px 0 #7a4800,
    6px 6px 0 rgba(0,0,0,0.25);
  line-height: 1;
  margin-bottom: 6px;
}
.title-card .tagline {
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}

/* Decorative stars */
.title-card::before, .title-card::after {
  content: '★';
  position: absolute;
  font-size: 20px;
  color: var(--legendary);
  top: 16px;
}
.title-card::before { left: 18px; }
.title-card::after  { right: 18px; }

#login-btn {
  font-size: 14px;
  padding: 14px 32px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 8px;
  box-shadow: 0 5px 0 #8a1020, inset 0 1px 0 rgba(255,255,255,0.25);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  animation: pressBlink 1.4s ease-in-out infinite;
}
@keyframes pressBlink {
  0%,100% { opacity:1; }
  50%      { opacity:.65; }
}
#login-btn:hover {
  animation: none;
  filter: brightness(1.1);
  transform: translateY(-2px);
  box-shadow: 0 7px 0 #8a1020, inset 0 1px 0 rgba(255,255,255,0.25);
}
#login-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #8a1020; }

.login-sub {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* =============================================
   SCROLLBAR
   ============================================= */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-thumb {
  background: var(--panel-darker);
  border-radius: 5px;
  border: 1px solid var(--panel-shadow);
}
::-webkit-scrollbar-track { background: var(--bg2); }

/* =============================================
   MOBILE
   ============================================= */
@media (max-width: 760px) {
  #main-container { flex-direction: column; }
  #leaderboard { width: 100%; order: 2; }
  #top-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
  .topbar-right { flex-wrap: wrap; }
}

.topbar-left  { display:flex; flex-direction:column; gap:2px; }
.topbar-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

/* Sort label */
.sort-label {
  font-size: 12px; font-weight: 800;
  color: var(--panel-dark);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<!-- LOGIN / TITLE SCREEN -->
<div id="login-screen">
  <div class="title-card">
    <h1>INTRAMON</h1>
    <div class="tagline">COLLECT &bull; TRADE &bull; BATTLE</div>
    <button id="login-btn">▶ Press Start — Login via 42</button>
  </div>
  <div class="login-sub">© 2025 &nbsp;·&nbsp; All Intramon Are Fictional</div>
</div>

<!-- TOP BAR -->
<header id="top-bar" class="hidden">
  <div class="topbar-left">
    <div id="game-title">INTRAMON</div>
    <div id="username-display"></div>
  </div>

  <div class="topbar-right">
    <button id="check-inbox-btn" class="btn-primary">📬 Inbox</button>

    <div style="display:flex; gap:6px; align-items:center;">
      <input id="claim-code-input" placeholder="Claim code…" style="width:130px;">
      <button id="claim-code-btn" class="btn-secondary">Redeem</button>
    </div>

    <div id="sort-controls" style="display:flex; align-items:center; gap:6px;">
      <span class="sort-label">Sort</span>
      <select id="sort-select">
        <option value="name">Name</option>
        <option value="rarity">Rarity</option>
        <option value="element">Element</option>
      </select>
      <button id="sort-order-btn" class="btn-secondary" title="Toggle order">▲</button>
    </div>

    <div id="crystal-counter">
      💎 <span id="crystal-amount">0</span>
    </div>
  </div>
</header>

<main id="main-container">
  <!-- Leaderboard -->
  <aside id="leaderboard">
    <div class="rpg-panel">
      <div class="rpg-panel-title">🏆 Top Trainers</div>
      <div id="leaderboard-inner">
        <ol id="leaderboard-list"></ol>
        <button id="leaderboard-refresh-btn" class="btn-secondary" style="width:100%; margin-top:4px;">Refresh</button>
      </div>
    </div>
  </aside>

  <!-- Grid -->
  <section style="flex:1;">
    <div id="monster-grid"></div>
  </section>
</main>

<!-- MONSTER MODAL -->
<div id="monster-modal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-header-title">Monster Info</span>
      <button class="close-btn">✕ Close</button>
    </div>
    <div class="modal-body">
      <div class="modal-art-box" id="modal-art-box">
        <img id="modal-img" src="" alt="Monster">
      </div>
      <h2 id="modal-name"></h2>
      <small id="modal-rarity"></small>
      <div class="stat-list">
        <div class="stat-row">
          <span class="stat-label">HP</span>
          <div class="stat-bar-wrap"><div class="stat-bar hp" id="modal-hp-bar" style="width:0%"></div></div>
          <span class="stat-val" id="modal-hp"></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">ATK</span>
          <div class="stat-bar-wrap"><div class="stat-bar atk" id="modal-atk-bar" style="width:0%"></div></div>
          <span class="stat-val" id="modal-attack"></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">DEF</span>
          <div class="stat-bar-wrap"><div class="stat-bar def" id="modal-def-bar" style="width:0%"></div></div>
          <span class="stat-val" id="modal-defense"></span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="gift-btn" class="btn-primary">🎁 Gift to Player</button>
    </div>
  </div>
</div>

<!-- INBOX MODAL -->
<div id="inbox-modal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-header-title">📬 Incoming!</span>
      <button class="close-btn">✕ Close</button>
    </div>
    <div class="modal-body">
      <p id="inbox-reason"></p>
      <div class="modal-art-box">
        <img id="inbox-img" src="" alt="Monster">
      </div>
      <h2 id="inbox-name"></h2>
      <small id="inbox-rarity"></small>
      <span id="inbox-count"></span>
    </div>
    <div class="modal-footer">
      <button id="claim-btn" class="btn-primary">✔ Claim</button>
      <button id="claim-all-btn" class="btn-secondary">Claim All</button>
    </div>
  </div>
</div>

<script>
/* =========================
   STATE
   ========================= */
const state = {
  monsters: [],
  currentSort: { key: 'name', ascending: true },
  inboxQueue: [],
  inboxIndex: 0
};

const elementColors = {
  Electro:'#c8a800', Water:'#1a6aaa', Fire:'#cc4400',
  Ice:'#1a8a9a', Plant:'#2a7a3a', Ground:'#8a5820'
};

function getRarityColor(r) {
  switch((r||'').toLowerCase()) {
    case 'common':    return '#2d8a2d';
    case 'rare':      return '#1a6aaa';
    case 'epic':      return '#8820aa';
    case 'legendary': return '#c07000';
    default:          return '#666';
  }
}
function getRarityLabel(r) {
  switch((r||'').toLowerCase()) {
    case 'common':    return '◆ Common';
    case 'rare':      return '◆◆ Rare';
    case 'epic':      return '◆◆◆ Epic';
    case 'legendary': return '★ Legendary';
    default:          return r;
  }
}

/* =========================
   MONSTER MODAL
   ========================= */
const monsterModalEl = document.getElementById('monster-modal');

function openMonsterModal(m) {
  document.getElementById('modal-img').src = m.image || '/monsters/placeholder.png';
  document.getElementById('modal-name').textContent = m.name;
  document.getElementById('modal-rarity').textContent = getRarityLabel(m.rarity);
  document.getElementById('modal-rarity').style.color = getRarityColor(m.rarity);
  document.getElementById('modal-hp').textContent = m.hp;
  document.getElementById('modal-attack').textContent = m.attack;
  document.getElementById('modal-defense').textContent = m.defense;

  // Animate stat bars (assume max ~250)
  const max = 250;
  setTimeout(() => {
    document.getElementById('modal-hp-bar').style.width  = Math.min(100, (m.hp  /max)*100)+'%';
    document.getElementById('modal-atk-bar').style.width = Math.min(100, (m.attack/max)*100)+'%';
    document.getElementById('modal-def-bar').style.width = Math.min(100, (m.defense/max)*100)+'%';
  }, 60);

  // Art box bg by element
  const artBox = document.getElementById('modal-art-box');
  const gradients = {
    Electro:'linear-gradient(160deg,#fff8c0,#f0e060)',
    Water:'linear-gradient(160deg,#c8eeff,#a0d0f0)',
    Fire:'linear-gradient(160deg,#ffe0c0,#ffb080)',
    Ice:'linear-gradient(160deg,#d8f4f8,#b0e0e8)',
    Plant:'linear-gradient(160deg,#d0f0d0,#98d898)',
    Ground:'linear-gradient(160deg,#f0e0c0,#d0a868)'
  };
  artBox.style.background = gradients[m.element] || 'linear-gradient(160deg,#e8ddc8,#d0c8b0)';

  monsterModalEl.querySelector('.modal-header').style.borderBottom =
    `3px solid ${getRarityColor(m.rarity)}`;
  monsterModalEl.classList.add('show');
  document.getElementById('gift-btn').onclick = () => giftMonster(m);
}
function closeMonsterModal() { monsterModalEl.classList.remove('show'); }
monsterModalEl.querySelector('.close-btn').addEventListener('click', closeMonsterModal);
monsterModalEl.addEventListener('click', e => { if(e.target===monsterModalEl) closeMonsterModal(); });

/* =========================
   RENDER
   ========================= */
function renderMonsters(monsters) {
  const grid = document.getElementById('monster-grid');
  grid.innerHTML = '';

  const sorted = [...monsters].sort((a, b) => {
    const dir = state.currentSort.ascending ? 1 : -1;
    if (state.currentSort.key === 'rarity') {
      const ord = ['common','rare','epic','legendary'];
      return (ord.indexOf(a.rarity.toLowerCase()) - ord.indexOf(b.rarity.toLowerCase())) * dir;
    }
    if (state.currentSort.key === 'element') {
      if (a.element===b.element) return a.name.localeCompare(b.name)*dir;
      return a.element.localeCompare(b.element)*dir;
    }
    return a.name.localeCompare(b.name)*dir;
  });

  sorted.forEach((m, idx) => {
    const rarity = (m.rarity||'common').toLowerCase();
    const card = document.createElement('div');
    card.className = 'monster-card';
    card.setAttribute('data-rarity', rarity);
    card.setAttribute('data-element', m.element||'');

    card.innerHTML = `
      <div class="card-banner">
        <span class="card-banner-name">${m.name}</span>
        <span class="card-hp-badge">HP ${m.hp}</span>
      </div>
      <div class="card-art">
        <img src="${m.image||'/monsters/placeholder.png'}"
             alt="${m.name}"
             onerror="this.onerror=null;this.src='/monsters/placeholder.png';">
      </div>
      <div class="card-info">
        <span class="card-rarity-pip">${{common:'◆',rare:'◆◆',epic:'◆◆◆',legendary:'★'}[rarity]||'◆'}</span>
        <span class="card-type-pill">${m.element||'???'}</span>
      </div>
    `;

    card.addEventListener('click', () => openMonsterModal(m));
    card.style.animationDelay = `${idx * 45}ms`;
    setTimeout(() => card.setAttribute('data-loaded','true'), 10);
    grid.appendChild(card);
  });
}

/* =========================
   FETCH MONSTERS
   ========================= */
async function fetchMonsters() {
  try {
    const res = await fetch('/my-monsters');
    if (!res.ok) return;
    const data = await res.json();
    state.monsters = data.monsters||[];
    updateUserUI(data);
    renderMonsters(state.monsters);
  } catch(err) { console.error(err); }
}

/* =========================
   USER UI
   ========================= */
function updateUserUI(data) {
  document.getElementById('username-display').textContent =
    `Trainer: ${data.name}  ·  ${data.coalitionName||'—'}`;
  document.getElementById('crystal-amount').textContent = data.crystals??0;
  const col = data.coalitionColor || '#e63946';
  applyCoalitionTheme(col);
}

function applyCoalitionTheme(hex) {
  const dark = hexDarken(hex, 0.55);
  document.documentElement.style.setProperty('--red', hex);
  document.getElementById('top-bar').style.borderBottom = `4px solid ${hex}`;
  ['check-inbox-btn','claim-code-btn','sort-order-btn','leaderboard-refresh-btn'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.style.background = hex;
    btn.style.boxShadow = `0 4px 0 ${dark}, inset 0 1px 0 rgba(255,255,255,0.25)`;
    btn.style.border = `1px solid ${dark}`;
  });
}

function hexDarken(hex,f){
  let h=(hex||'#e63946').replace('#','');
  if(h.length===3)h=h.split('').map(c=>c+c).join('');
  const n=parseInt(h,16);
  const r=Math.round(((n>>16)&255)*f),g=Math.round(((n>>8)&255)*f),b=Math.round((n&255)*f);
  return `rgb(${r},${g},${b})`;
}

/* =========================
   LEADERBOARD
   ========================= */
async function fetchLeaderboard() {
  try {
    const res = await fetch('/leaderboard');
    if (!res.ok) throw new Error();
    const data = await res.json();
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = '';
    data.leaderboard.forEach((p,i) => {
      const li = document.createElement('li');
      const medals = ['🥇','🥈','🥉'];
      li.innerHTML = `<span class="rank">${medals[i]||`${i+1}.`}</span>${p.name} <span style="color:var(--ink-muted);margin-left:auto;font-size:12px;">${p.monsterCount}🃏</span>`;
      list.appendChild(li);
    });
  } catch(err) { console.error(err); }
}

/* =========================
   GIFT
   ========================= */
async function giftMonster(monster) {
  const to = prompt('Enter receiver username:');
  if (!to) return;
  try {
    const uRes = await fetch(`/find-user/${to}`);
    const uData = await uRes.json();
    if (!uData.exists) { alert('User not found!'); return; }
    const res = await fetch('/gift',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({toPlayerId:uData.playerId,offeredMonsters:[monster]})
    });
    const result = await res.json();
    if (res.ok) { alert('Monster sent!'); closeMonsterModal(); fetchMonsters(); }
    else alert('Gift failed: '+(result.error||'Unknown'));
  } catch(err) { alert('Gift failed: '+err.message); }
}

/* =========================
   INBOX
   ========================= */
const inboxModalEl = document.getElementById('inbox-modal');
const inboxEls = {
  reason:   document.getElementById('inbox-reason'),
  img:      document.getElementById('inbox-img'),
  name:     document.getElementById('inbox-name'),
  rarity:   document.getElementById('inbox-rarity'),
  claimBtn: document.getElementById('claim-btn'),
  count:    document.getElementById('inbox-count')
};

async function checkInbox() {
  try {
    const res = await fetch('/my-inbox');
    const data = await res.json();
    if (!data.inbox.length) { alert('Your inbox is empty!'); return; }
    state.inboxQueue = data.inbox; state.inboxIndex = 0;
    updateInboxCount(); showInbox(0);
  } catch(err) { alert(err.message); }
}

function updateInboxCount() {
  const cnt = state.inboxQueue.length - state.inboxIndex;
  inboxEls.count.textContent = `${cnt} monster${cnt!==1?'s':''} waiting`;
}

function showInbox(i) {
  if (i >= state.inboxQueue.length) {
    inboxModalEl.classList.remove('show');
    state.inboxQueue=[]; state.inboxIndex=0;
    fetchMonsters(); return;
  }
  const mon = state.inboxQueue[i];
  inboxEls.reason.textContent = `Reason: ${mon.reason.charAt(0).toUpperCase()+mon.reason.slice(1)}`;
  inboxEls.name.textContent = mon.name;
  inboxEls.rarity.textContent = getRarityLabel(mon.rarity);
  inboxEls.rarity.style.color = getRarityColor(mon.rarity);
  inboxEls.img.src = mon.image||'/monsters/placeholder.png';
  inboxModalEl.classList.add('show');
  inboxEls.claimBtn.onclick = () => claimMonster(mon.instanceId);
  updateInboxCount();
}

async function claimMonster(id) {
  try {
    const res = await fetch(`/claim/${id}`,{method:'POST'});
    if (!res.ok) throw new Error('Claim failed');
    state.inboxIndex++; showInbox(state.inboxIndex);
  } catch(err) { alert(err.message); }
}

document.getElementById('check-inbox-btn').addEventListener('click', checkInbox);
document.getElementById('claim-all-btn').addEventListener('click', async () => {
  try {
    const res = await fetch('/claim-all',{method:'POST'});
    const data = await res.json();
    if (res.ok) {
      alert(data.message);
      state.inboxQueue=[]; state.inboxIndex=0;
      inboxModalEl.classList.remove('show');
      fetchMonsters();
    } else alert(data.error||'Failed to claim all');
  } catch { alert('Error claiming all'); }
});
inboxModalEl.querySelector('.close-btn').addEventListener('click', ()=>inboxModalEl.classList.remove('show'));
inboxModalEl.addEventListener('click', e=>{ if(e.target===inboxModalEl) inboxModalEl.classList.remove('show'); });

/* =========================
   SORT
   ========================= */
document.getElementById('sort-select').addEventListener('change', e => {
  state.currentSort.key = e.target.value;
  renderMonsters(state.monsters);
});
document.getElementById('sort-order-btn').addEventListener('click', () => {
  state.currentSort.ascending = !state.currentSort.ascending;
  document.getElementById('sort-order-btn').textContent = state.currentSort.ascending ? '▲' : '▼';
  renderMonsters(state.monsters);
});

/* =========================
   CLAIM CODE
   ========================= */
document.getElementById('claim-code-btn').addEventListener('click', async () => {
  const code = document.getElementById('claim-code-input').value.trim();
  if (!code) return alert('Enter a code!');
  try {
    const res = await fetch('/claim-code',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code})
    });
    const data = await res.json();
    if (res.ok) { alert(`You received ${data.monster.name}! Check your inbox!`); document.getElementById('claim-code-input').value=''; }
    else alert(data.error||'Invalid code');
  } catch { alert('Error redeeming code'); }
});

document.getElementById('leaderboard-refresh-btn').addEventListener('click', fetchLeaderboard);
document.getElementById('login-btn').addEventListener('click', ()=>window.location.href='/login');

/* =========================
   INIT
   ========================= */
(async function init() {
  try {
    const res = await fetch('/my-monsters');
    if (res.ok) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('top-bar').classList.remove('hidden');
      await fetchMonsters();
      await fetchLeaderboard();
      try {
        const logRes = await fetch('/refresh-logtime');
        if (logRes.ok) {
          const logData = await logRes.json();
          if (logData.rewardGranted) {
            alert(`You earned a reward for logging ${logData.hours} hours today!`);
            await checkInbox();
          }
        }
      } catch {}
    }
  } catch { /* not logged in */ }
})();
</script>
</body>
</html>
